name: CI — Pull Request Checks

# Chạy khi tạo/cập nhật PR vào main hoặc develop
# Mục đích: kiểm tra chất lượng code TRƯỚC khi merge
on:
  pull_request:
    branches: [main, develop]

jobs:
  # ── Python agent/prototype checks (local dev only, không deploy) ───────────
  python-check:
    name: Python — Lint & Test (agent prototype)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          OPENAI_API_KEY: test-key  # Agent chạy deterministic, không cần key thật

  # ── Frontend checks (Next.js trong src/frontend) ──────────────────────────
  frontend-check:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if src/frontend exists
        id: check_web
        run: |
          if [ -f "src/frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  src/frontend chưa tồn tại — bỏ qua frontend checks"
          fi

      - name: Set up Node.js
        if: steps.check_web.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.check_web.outputs.exists == 'true'
        run: npm ci
        working-directory: src/frontend

      - name: Lint frontend
        if: steps.check_web.outputs.exists == 'true'
        run: npm run lint
        working-directory: src/frontend

      - name: Build frontend
        if: steps.check_web.outputs.exists == 'true'
        run: npm run build
        working-directory: src/frontend
